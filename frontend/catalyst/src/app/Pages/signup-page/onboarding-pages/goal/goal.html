<div class="left-section">
    <div class="logo">
        <img src="../../../assets/Catalyst-Favicon.ico" alt="Catalyst Logo" width="100" height="100">
    </div>
    <h1>What is your primary goal for using Catalyst?</h1>
</div>
<div class="right-section">
    <app-roadmap-button 
        [buttonText]='"School Exams (Class 10/12 Boards)"'
        [isSelected]="selectedGoal === 'School Exams (Class 10/12 Boards)'"
        (buttonClicked)="onGoalSelected($event)" />
    <app-roadmap-button 
        [buttonText]='"College Entrance Exams"'
        [isSelected]="selectedGoal === 'College Entrance Exams'"
        (buttonClicked)="onGoalSelected($event)" />
    <app-roadmap-button 
        [buttonText]='"Career Advancement"'
        [isSelected]="selectedGoal === 'Career Advancement'"
        (buttonClicked)="onGoalSelected($event)" />
    <app-roadmap-button 
        [buttonText]='"Skill Development"'
        [isSelected]="selectedGoal === 'Skill Development'"
        (buttonClicked)="onGoalSelected($event)" />
    <button class="next-btn" (click)="proceedToNext()" [disabled]="!selectedGoal">Next</button>
</div>
<div class="skip" (click)="skip()">
    Skip
</div>
