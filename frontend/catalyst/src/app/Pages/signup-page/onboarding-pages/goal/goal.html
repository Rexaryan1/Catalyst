<div class="left-section">
    <div class="logo">
        <img src="../../../assets/Catalyst-Favicon.ico" alt="Catalyst Logo" width="100" height="100">
    </div>
    <h1>What is your primary goal for using Catalyst?</h1>
    <app-step-indicator [totalSteps]="5" [activeStep]="1"></app-step-indicator>
</div>
<div class="right-section">
    <div class="buttons-container">
        <app-roadmap-button [buttonText]='"School Exams (Class 10/12 Boards)"'
            [isSelected]="selectedGoal === 'School Exams (Class 10/12 Boards)'"
            (buttonClicked)="onGoalSelected($event)" />
        <app-roadmap-button [buttonText]='"University Semester Exams"'
            [isSelected]="selectedGoal === 'University Semester Exams'" (buttonClicked)="onGoalSelected($event)" />
        <app-roadmap-button [buttonText]='"General Knowledge"' [isSelected]="selectedGoal === 'General Knowledge'"
            (buttonClicked)="onGoalSelected($event)" />
        <app-roadmap-button [buttonText]='"Competitive Exams"' [isSelected]="selectedGoal === 'Competitive Exams'"
            (buttonClicked)="onGoalSelected($event)" />
        <app-roadmap-button [buttonText]='"Professional Certification"'
            [isSelected]="selectedGoal === 'Professional Certification'" (buttonClicked)="onGoalSelected($event)" />
        <app-roadmap-button [buttonText]='"Other"' [isSelected]="selectedGoal === 'Other'"
            (buttonClicked)="onGoalSelected($event)" />
    </div>
    <button class="next-btn" (click)="proceedToNext()" [disabled]="!selectedGoal">Next</button>
</div>
<div class="skip" (click)="skip()">
    Skip
</div>
