<div class="profile-summary" (click)="navigateToProfile()">
    <img src="assets/avatars/nerd.png"/>
  <div class = "summary-info">
    <div class="welcome">Welcome</div>
    <div class="name">{{ userProfile?.name }}</div>
    <div class="profile-summary-scores-flex">
      <app-score-card [score]="userProfile?.profile.learning_streak" [metricName]="'Streak'"/>
      <app-score-card [score]="userProfile?.profile.average_accuracy" [metricName]="'Delta'"/>
      <app-score-card [score]="userProfile?.profile.average_time_per_question" [metricName]="'XP Points'"/>
    </div>
  </div>
</div>
