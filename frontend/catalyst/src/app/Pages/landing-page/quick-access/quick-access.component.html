<div class="quick-access">
  <a
    *ngFor="let item of items; let last = last"
    class="access-item"
    [routerLink]="item.route"
    [title]="item.label">
    <img class="access-icon" [src]="item.icon" [alt]="item.label" />
    <span class="access-label">{{ item.label | uppercase }}</span>

<!--    <div *ngIf="!last" class="access-divider" aria-hidden="true"></div>-->
  </a>
</div>
