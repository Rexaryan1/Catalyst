<app-nav-bar></app-nav-bar>

<div class="dashboard-container text-white ">
  <div class="container-fluid pt-1">
    <!-- Hero Section -->
    <div class="top-left-section text-center ">
      <div>
        <h1 class="hero-title">Hello,</h1>
        <h1 class="hero-subtitle">Ready to take your learning to the next level?</h1>
      </div>
    </div>
    <div class="top-right-section text-center">
      <p class="lead mt-4">Your AI-powered learning companion — personalized, dynamic, and ready to help you grow.</p>

      <div class="d-flex justify-content-center">
        <button type="button" class="btn btn-light p-3 get-started-btn" aria-label="Get started with Catalyst">Get
          Started</button>
      </div>
    </div>

    <!-- Cards Grid Section -->
    <div *ngIf="this.dataManager.isUserLoggedIn()" class="cards-flex-layout">
      <div class="grid-item-1"><app-roadmap-card /></div>
      <div class="grid-item-2"><landing-dashboard-card /></div>
      <div class="grid-item-3"><app-profile-summary /><app-quick-access /></div>
    </div>
  </div>

  <!-- <app-beta-page class="login-container" (closeLogin)="toggleLoginVisibility()"></app-beta-page> -->
</div>
