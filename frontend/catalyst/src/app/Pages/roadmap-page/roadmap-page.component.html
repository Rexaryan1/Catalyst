<div class="main-page">
  <div class="page-title">Your roadmap is ready — let’s start cracking questions!</div>
  <div class="content-area">
    <app-roadmap-list
      class="roadmap-pane"
      (questionSelected)="onQuestionSelected($event)">
    </app-roadmap-list>

    <app-question-card
      class="question-pane"
      [questions]="activeQuestions"
      [index]="activeIndex"
      (indexChange)="onIndexChange($event)">
    </app-question-card>
  </div>

</div>
