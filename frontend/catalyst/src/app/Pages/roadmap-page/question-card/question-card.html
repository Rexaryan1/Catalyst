<div class="question-card" *ngIf="question as q; else emptyState">
  <div class="qc-header">
    <div class="qc-title">Question</div>
    <div class="analysis-menu">
      <button (click)="onSubmitClicked()" class="btn-submit">
        Submit for analysis
      </button>
      <div class="timer-badge" [class.paused]="isSubmitted">
        <span class="material-icons">timer</span>
        <span class="timer-display">{{ formattedTime }}</span>
      </div>
    </div>
  </div>

  <div class="qc-body">
    <p class="question-text">{{ q.question_text }}</p>

    <div class="options-container" role="list">
      <button
        *ngFor="let option of (q.options ?? []); let i = index"
        type="button"
        class="option"
        role="listitem"
        [class.selected]="optionClass(i) === 'selected'"
        [class.correct]="optionClass(i) === 'correct'"
        [class.incorrect]="optionClass(i) === 'incorrect'"
        [disabled]="isSubmitted"
        (click)="selectOption(i)"
      >
        <span class="option-badge">{{ ('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.charAt(i)) }}</span>
        <span class="option-label">{{ option }}</span>
      </button>
    </div>

    <div class="feedback" *ngIf="isSubmitted">
      <p @if(isCorrect) class="feedback-correct">Correct!</p>
      <p *ngIf="isCorrect === false" class="feedback-incorrect">
        Incorrect. Correct answer: {{ q.options[q.correct_index] }}
      </p>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="btn" (click)="prev()" [disabled]="index <= 0">Previous</button>

    <button class="btn primary" (click)="continue()">
      {{ isSubmitted ? 'Next' : 'Check Answer' }}
    </button>

    <button class="btn" (click)="next()" [disabled]="index >= (questions.length - 1)">
      Skip
    </button>

  </div>
</div>

<ng-template #emptyState>
  <div class="question-card empty">
    <div class="qc-header">
      <div class="qc-title">Question</div>
    </div>

    <div class="qc-body">
      <p class="empty-text">Select a question from the roadmap to begin.</p>
    </div>
  </div>
</ng-template>
