<footer class="footer-section">
    <app-section-lines
    [rows]="rows"
    [cols]="cols"
    color="#46675D"
    [squareSize]="10"
  ></app-section-lines>
  <div class="footer-main">
    <div class="footer-main-inner">
      <div class="footer-copy">
        <h2>Ready to Rethink Learning?</h2>
        <p>Stay Updated. Subscribe to our newsletter</p>

        <form class="footer-subscribe-form" (ngSubmit)="onSubmit()" novalidate>
          <input
            type="email"
            name="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            placeholder="Enter your email"
            aria-label="Email address"
            [attr.aria-busy]="isLoading"
            [disabled]="isLoading"
            autocomplete="email"
          />
          <button type="submit"
                  [disabled]="isLoading"
                  [attr.aria-label]="isLoading ? 'Subscribing…' : 'Subscribe'">
            @if (isLoading) {
              <span class="spinner" aria-hidden="true"></span>
              <span>Subscribing…</span>
            } @else {
              <span>Subscribe</span>
            }
          </button>
        </form>
        @if (toastMessage) {
          <div
            class="footer-toast"
            [ngClass]="'footer-toast--' + toastType"
            role="status"
            aria-live="polite"
          >
            {{ toastMessage }}
          </div>
        }
      </div>
    </div>
  </div>

  <div class="footer-links">
    <span class="footer-links-label">Quick links</span>

    <nav class="footer-links-nav" aria-label="Quick links">
      <a href="/about">About</a>
      <a href="/signup">Sign up</a>
      <a href="/roadmap">Roadmaps</a>
      <a href="/contact">Contact</a>
    </nav>
  </div>
</footer>
